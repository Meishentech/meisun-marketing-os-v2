<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>美昇 Marketing OS v2</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <section class="login-screen" id="loginScreen" aria-label="登入">
    <div class="login-card">
      <div class="brand login-brand">
        <div class="brand-mark">MS</div>
        <div>
          <strong>美昇 Marketing OS</strong>
          <span>v2 secure access</span>
        </div>
      </div>
      <h1>登入新版行銷管理平台</h1>
      <p>使用公司帳號登入後，系統會依角色顯示總經理、行銷總監或業務畫面。</p>
      <form class="login-form" id="loginForm">
        <label>
          <span>Email</span>
          <input id="loginEmail" type="email" autocomplete="username" required>
        </label>
        <label>
          <span>密碼</span>
          <input id="loginPassword" type="password" autocomplete="current-password" required>
        </label>
        <button class="primary-button" id="loginButton" type="submit">登入</button>
      </form>
      <p class="form-message" id="loginMessage"></p>
    </div>
  </section>

  <div class="app-shell is-hidden" id="appShell">
    <aside class="sidebar" aria-label="主要選單">
      <div class="brand">
        <div class="brand-mark">MS</div>
        <div>
          <strong>美昇 Marketing OS</strong>
          <span>v2 prototype</span>
        </div>
      </div>

      <div class="role-switch" aria-label="角色切換">
        <button class="role-button is-active" type="button" data-role="executive">總經理</button>
        <button class="role-button" type="button" data-role="marketing">行銷總監</button>
        <button class="role-button" type="button" data-role="sales">業務</button>
      </div>

      <nav class="nav-list" id="navList"></nav>

      <div class="sidebar-note">
        <strong id="currentUserLabel">未登入</strong>
        <span id="currentUserNote">正式登入後依角色顯示功能與資料。</span>
        <button class="logout-button" id="logoutButton" type="button">登出</button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <p class="eyebrow" id="roleEyebrow">EXECUTIVE VIEW</p>
          <h1 id="pageTitle">總經理戰情室</h1>
          <p class="page-subtitle" id="pageSubtitle">看預算、行銷案、商機、Channel 成效與待決策事項。</p>
        </div>
        <div class="top-actions">
          <button class="secondary-button" type="button">匯出摘要</button>
          <button class="primary-button" type="button" id="primaryAction">查看待決策</button>
        </div>
      </header>

  <section class="kpi-grid" id="kpiGrid" aria-label="重點指標"></section>

      <section class="content-grid" id="contentGrid" aria-label="主要內容"></section>
    </main>
  </div>

  <script src="core/config.js"></script>
  <script src="core/api.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
